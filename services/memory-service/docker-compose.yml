services:
  memory-service:
    image: ghcr.io/dujiepeng/memory-service:latest
    # build: .  # 本地开发时取消注释此行，注释 image 行
    ports:
      - "8100:8000"
    volumes:
      - ./data:/app/data
    environment:
      - EMBEDDING_MODEL=BAAI/bge-small-zh-v1.5
      - DEVICE=cpu
    restart: unless-stopped
